name: ${PROJECT_NAME}

services:

  nginx:
    image: nginx:stable-alpine
    container_name: ${PROJECT_NAME}_nginx

    ports:
      - "${NGINX_PORT}:80"

    volumes:
      - ./modx:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - php

    restart: unless-stopped

    networks:
      - modx_net


  php:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION}

    container_name: ${PROJECT_NAME}_php
    working_dir: /var/www/html

    volumes:
      - ./modx:/var/www/html

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - modx_net


  modx-init:
    image: alpine:3.20
    container_name: ${PROJECT_NAME}_modx_init

    restart: "no"

    depends_on:
      db:
        condition: service_healthy

    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MODX_VERSION: ${MODX_VERSION}
      MODX_TABLE_PREFIX: ${MODX_TABLE_PREFIX}

    volumes:
      - ./modx:/var/www/html
      - ./docker/modx/init.sh:/init.sh

    entrypoint: /bin/sh
    command: /init.sh

    networks:
      - modx_net


  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_db

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

    restart: unless-stopped

    networks:
      - modx_net


  mysql-backup:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_mysql_backup

    depends_on:
      - db

    restart: unless-stopped

    volumes:
      - ./backups/mysql:/backup
      - ./docker/cron/mysql-backup.sh:/backup.sh

    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    entrypoint: /bin/sh
    command: /backup.sh

    networks:
      - modx_net


  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}_redis

    command: redis-server --appendonly yes

    restart: unless-stopped

    networks:
      - modx_net


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${PROJECT_NAME}_phpmyadmin

    ports:
      - "${PMA_PORT}:80"

    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      - db

    restart: unless-stopped

    networks:
      - modx_net


volumes:
  db_data:
    name: ${PROJECT_NAME}_db_data


networks:
  modx_net:
    name: ${PROJECT_NAME}_modx_net